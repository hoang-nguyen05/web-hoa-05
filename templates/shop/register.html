{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Đăng ký tài khoản - FlowerShop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 p-5 mt-5">
            <h2 class="text-center mb-4 font-weight-bold text-primary"><i class="fas fa-user-plus me-2"></i>Đăng ký thành viên</h2>
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Đăng ký</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <p class="text-muted">Đã có tài khoản? <a href="{% url 'login' %}" class="text-primary text-decoration-none">Đăng nhập</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
